<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Globle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #e8f5e9; min-height: 100vh; }

    #app { max-width: 900px; margin: 0 auto; padding: 10px 12px 40px; }

    /* Header */
    #header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
    #logo { display: flex; align-items: center; gap: 6px; }
    #logo-icon { font-size: 28px; }
    #logo-text { font-size: 22px; font-weight: 900; color: #1b5e20; }
    #guess-badge { margin-left: auto; background: white; border: 2px solid #c8e6c9; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 800; color: #388e3c; }

    /* Mode */
    #mode-bar { text-align: center; margin: 4px 0 8px; }
    #mode-badge { display: inline-block; background: white; border: 1.5px solid #c8e6c9; border-radius: 20px; padding: 3px 16px; font-size: 12px; font-weight: 800; color: #555; }

    /* Search */
    #search-row { display: flex; gap: 8px; margin-bottom: 8px; }
    #search-wrap { position: relative; flex: 1; }
    #search-input { width: 100%; padding: 10px 14px; border: 2px solid #a5d6a7; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700; outline: none; background: white; color: #222; }
    #search-input:focus { border-color: #4caf50; }
    #search-input::placeholder { color: #aaa; font-weight: 600; }
    #submit-btn { padding: 10px 20px; background: #e53935; color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 900; cursor: pointer; }
    #submit-btn:hover { background: #c62828; }
    #submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* Autocomplete */
    #autocomplete { position: absolute; z-index: 100; background: white; border: 2px solid #a5d6a7; border-radius: 12px; max-height: 220px; overflow-y: auto; width: 100%; box-shadow: 0 4px 16px rgba(0,0,0,.1); display: none; top: 100%; left: 0; }
    .ac-item { padding: 8px 14px; cursor: pointer; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e8f5e9; }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: #e8f5e9; }
    .ac-flag { width: 24px; height: 16px; object-fit: cover; border-radius: 3px; }

    /* Feedback */
    #feedback { text-align: center; min-height: 36px; margin-bottom: 6px; }
    #feedback-text { font-size: 20px; font-weight: 900; }

    /* Main layout */
    #main { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }

    /* Guess list */
    #guess-list-wrap { width: 220px; flex-shrink: 0; }
    #guess-list-box { background: white; border: 2px solid #c8e6c9; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    #guess-list-header { background: linear-gradient(90deg, #43a047, #2e7d32); color: white; padding: 8px 14px; font-size: 12px; font-weight: 900; }
    #top3-section { border-bottom: 2.5px solid #a5d6a7; }
    #top3-label { font-size: 10px; font-weight: 900; color: #388e3c; padding: 4px 12px 2px; text-transform: uppercase; letter-spacing: .5px; background: #f1f8e9; }
    #all-guesses-section { max-height: 180px; overflow-y: auto; }
    .guess-row { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-bottom: 1px solid #f1f8e9; font-size: 11px; }
    .guess-row:last-child { border-bottom: none; }
    .guess-flag { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .guess-name { flex: 1; font-weight: 800; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .guess-pct { padding: 1px 6px; border-radius: 20px; font-size: 10px; font-weight: 900; flex-shrink: 0; }
    .guess-arrow { font-size: 13px; flex-shrink: 0; }

    /* Globe */
    #globe-area { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 260px; }
    #globe-canvas-wrap { width: 320px; height: 320px; border-radius: 50%; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.18); cursor: grab; background: #1a237e; }
    #globe-canvas-wrap:active { cursor: grabbing; }
    #globe-canvas-wrap canvas { display: block; }

    /* Distance bar */
    #dist-bar-wrap { width: 280px; }
    #dist-bar-labels { display: flex; justify-content: space-between; margin-bottom: 3px; }
    #dist-bar-labels span { font-size: 10px; font-weight: 800; color: #888; text-transform: uppercase; }
    #dist-bar-track { width: 100%; height: 12px; background: #c8e6c9; border-radius: 20px; overflow: hidden; }
    #dist-bar-fill { height: 100%; border-radius: 20px; transition: width .6s ease, background-color .6s; }
    #dist-bar-sub { display: flex; justify-content: space-between; margin-top: 3px; }
    #dist-bar-sub span { font-size: 10px; font-weight: 800; }

    /* Controls */
    #controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #free-label { font-size: 11px; font-weight: 900; color: #888; }
    #btn-row { display: flex; gap: 10px; }
    .ctrl-btn { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: 14px; font-family: inherit; font-size: 13px; font-weight: 900; cursor: pointer; color: white; }
    .ctrl-btn:disabled { opacity: .4; cursor: not-allowed; }
    #hint-btn { background: #43a047; box-shadow: 0 4px 12px rgba(67,160,71,.35); }
    #reveal-btn { background: #ef6c00; box-shadow: 0 4px 12px rgba(239,108,0,.35); }
    #exit-btn { background: #e53935; box-shadow: 0 4px 12px rgba(229,57,53,.35); }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: white; border-radius: 20px; padding: 32px 28px; max-width: 340px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,.2); text-align: center; }
    .modal-title { font-size: 20px; font-weight: 900; color: #1b5e20; margin-bottom: 12px; }
    .modal-text { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 20px; }
    .modal-btn { padding: 10px 28px; background: #43a047; color: white; border: none; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 900; cursor: pointer; }
    .modal-btn:hover { background: #2e7d32; }
    #win-trophy { font-size: 52px; margin-bottom: 8px; }
    #win-title { font-size: 26px; font-weight: 900; color: #1b5e20; margin-bottom: 4px; }
    #win-flag { width: 48px; height: 32px; object-fit: cover; border-radius: 4px; margin: 6px auto; display: block; }
    #win-country { font-size: 18px; font-weight: 900; color: #388e3c; margin-bottom: 6px; }
    #win-guesses { font-size: 14px; font-weight: 700; color: #666; margin-bottom: 18px; }
    #win-newgame { padding: 12px 32px; background: #43a047; color: white; border: none; border-radius: 14px; font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer; }
    #win-newgame:hover { background: #2e7d32; }

    @media (max-width: 600px) {
      #guess-list-wrap { width: 100%; }
      #main { flex-direction: column; align-items: center; }
      #globe-canvas-wrap { width: 260px; height: 260px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">
      <span id="logo-icon">🌍</span>
      <span id="logo-text">Globle</span>
    </div>
    <div id="guess-badge">Guesses: <span id="guess-count">0</span></div>
  </div>

  <div id="mode-bar">
    <div id="mode-badge">Mode: <strong>Normal</strong></div>
  </div>

  <div id="search-row">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="Type the hidden country here..." autocomplete="off"/>
      <div id="autocomplete"></div>
    </div>
    <button id="submit-btn">Submit</button>
  </div>

  <div id="feedback">
    <span id="feedback-text" style="color:#888">Guess a country to begin!</span>
  </div>

  <div id="main">
    <div id="guess-list-wrap" style="display:none">
      <div id="guess-list-box">
        <div id="guess-list-header">Best Guess: <span id="best-guess-name">—</span></div>
        <div id="top3-section">
          <div id="top3-label">⭐ Top 3 Closest</div>
          <div id="top3-rows"></div>
        </div>
        <div id="all-guesses-section">
          <div id="all-guess-rows"></div>
        </div>
      </div>
    </div>

    <div id="globe-area">
      <div id="globe-canvas-wrap"></div>

      <div id="dist-bar-wrap" style="display:none">
        <div id="dist-bar-labels">
          <span>Total Distance</span>
          <span id="dist-km">0 km</span>
        </div>
        <div id="dist-bar-track">
          <div id="dist-bar-fill" style="width:0%;background:#4caf50"></div>
        </div>
        <div id="dist-bar-sub">
          <span id="dist-label" style="color:#4caf50"></span>
          <span id="dist-pct" style="color:#888"></span>
        </div>
      </div>

      <div id="controls">
        <div id="free-label">FREE <span id="hints-used">0</span>/1</div>
        <div id="btn-row">
          <button class="ctrl-btn" id="hint-btn">💡 Hint</button>
          <button class="ctrl-btn" id="reveal-btn">📍 Reveal</button>
          <button class="ctrl-btn" id="exit-btn">🔄 New Game</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Hint Modal -->
<div class="modal-overlay" id="hint-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title">💡 Hint</div>
    <div class="modal-text" id="hint-text"></div>
    <button class="modal-btn" onclick="document.getElementById('hint-modal').style.display='none'">Got it!</button>
  </div>
</div>

<!-- Win Modal -->
<div class="modal-overlay" id="win-modal" style="display:none">
  <div class="modal-box">
    <div id="win-trophy">🏆</div>
    <div id="win-title">You got it!</div>
    <img id="win-flag" src="" alt=""/>
    <div id="win-country"></div>
    <div id="win-guesses"></div>
    <button id="win-newgame" onclick="startNewGame()">Play Again</button>
  </div>
</div>

// ======================== UTILS ========================
const MAX_DISTANCE = 20000;
function toRad(d) { return d * Math.PI / 180; }
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getProximityColor(d) {
  const r = d/MAX_DISTANCE;
  if (r<0.01) return {bg:"#FF0000",label:"🔥 Correct!",textColor:"#fff"};
  if (r<0.05) return {bg:"#FF1A1A",label:"Burning hot!",textColor:"#fff"};
  if (r<0.10) return {bg:"#FF4D00",label:"Very hot!",textColor:"#fff"};
  if (r<0.15) return {bg:"#FF8000",label:"Hot!",textColor:"#fff"};
  if (r<0.20) return {bg:"#FFB300",label:"Warm",textColor:"#000"};
  if (r<0.30) return {bg:"#FFE066",label:"Getting warmer",textColor:"#000"};
  if (r<0.40) return {bg:"#E6FF66",label:"Lukewarm",textColor:"#000"};
  if (r<0.55) return {bg:"#99FF66",label:"Cool",textColor:"#000"};
  if (r<0.70) return {bg:"#66CCFF",label:"Cold",textColor:"#000"};
  if (r<0.85) return {bg:"#3399FF",label:"Very cold",textColor:"#fff"};
  return {bg:"#1A66FF",label:"Freezing!",textColor:"#fff"};
}
function getProximityPercent(d) { return Math.max(0, Math.round((1-d/MAX_DISTANCE)*100)); }
function getDistanceLabel(d) {
  if(d<200) return "is extremely close!"; if(d<750) return "is very close!";
  if(d<1500) return "is close."; if(d<3000) return "is getting closer.";
  if(d<5000) return "is somewhat far."; if(d<8000) return "is far.";
  if(d<12000) return "is very far."; return "is extremely far.";
}
function getBearing(lat1,lng1,lat2,lng2) {
  const dLng=toRad(lng2-lng1), y=Math.sin(dLng)*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function getDirectionArrow(b) { return ["⬆️","↗️","➡️","↘️","⬇️","↙️","⬅️","↖️"][Math.round(b/45)%8]; }

// ======================== GAME STATE ========================
let targetCountry, guesses, gameOver, hintsUsed;
function pickRandom() { return COUNTRIES[Math.floor(Math.random()*COUNTRIES.length)]; }
function initGame() {
  targetCountry = pickRandom(); guesses = []; gameOver = false; hintsUsed = 0;
  renderUI(); clearMarkers();
}

// ======================== THREE.JS GLOBE ========================
let scene, camera, renderer, globe, markers3d=[];
let isDragging=false, prevMouse={x:0,y:0};
function initGlobe() {
  const wrap = document.getElementById('globe-canvas-wrap');
  const W=wrap.clientWidth||320, H=wrap.clientHeight||320;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  camera.position.z = 3.2;
  renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,0); wrap.appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.8); dl.position.set(5,3,5); scene.add(dl);
  const geo=new THREE.SphereGeometry(1,64,64);
  const tex=new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-day.jpg');
  globe=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({map:tex,shininess:15})); scene.add(globe);
  wrap.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
    globe.rotation.y+=dx*0.005; globe.rotation.x+=dy*0.005;
    globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globe.rotation.x));
    prevMouse={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mouseup',()=>isDragging=false);
  wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}},{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(!isDragging||e.touches.length!==1)return;
    const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
    globe.rotation.y+=dx*0.005; globe.rotation.x+=dy*0.005;
    globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globe.rotation.x));
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});
  wrap.addEventListener('touchend',()=>isDragging=false);
  window.addEventListener('resize',()=>{const w=wrap.clientWidth,h=wrap.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);});
  (function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);})();
}
function clearMarkers(){markers3d.forEach(m=>globe.remove(m));markers3d=[];}
function addMarker(lat,lng,colorHex){
  const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;
  const x=-1.02*Math.sin(phi)*Math.cos(theta),y=1.02*Math.cos(phi),z=1.02*Math.sin(phi)*Math.sin(theta);
  const color=new THREE.Color(colorHex);
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.04,16,16),new THREE.MeshBasicMaterial({color}));
  mesh.position.set(x,y,z); globe.add(mesh); markers3d.push(mesh);
  const glow=new THREE.Mesh(new THREE.SphereGeometry(0.06,16,16),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.3}));
  glow.position.set(x,y,z); globe.add(glow); markers3d.push(glow);
}

// ======================== AUTOCOMPLETE ========================
const searchInput=document.getElementById('search-input'), acBox=document.getElementById('autocomplete');
let acIndex=-1, acItems=[];
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase(); acBox.innerHTML=''; acIndex=-1;
  if(!q){acBox.style.display='none';return;}
  const guessedNames=new Set(guesses.map(g=>g.country.name));
  acItems=COUNTRIES.filter(c=>c.name.toLowerCase().startsWith(q)&&!guessedNames.has(c.name)).slice(0,8);
  if(!acItems.length){acBox.style.display='none';return;}
  acItems.forEach((c,i)=>{
    const div=document.createElement('div'); div.className='ac-item';
    div.innerHTML=`<img class="ac-flag" src="https://flagcdn.com/24x18/${c.code.toLowerCase()}.png" onerror="this.style.display='none'"/> ${c.name}`;
    div.addEventListener('mousedown',e=>{e.preventDefault();selectCountry(c);});
    acBox.appendChild(div);
  });
  acBox.style.display='block';
});
searchInput.addEventListener('keydown',e=>{
  const items=acBox.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acIndex=Math.min(acIndex+1,items.length-1);highlightAc(items);e.preventDefault();}
  else if(e.key==='ArrowUp'){acIndex=Math.max(acIndex-1,-1);highlightAc(items);e.preventDefault();}
  else if(e.key==='Enter'){e.preventDefault();if(acIndex>=0&&acItems[acIndex])selectCountry(acItems[acIndex]);else submitGuess();}
  else if(e.key==='Escape'){acBox.style.display='none';}
});
document.addEventListener('click',e=>{if(!document.getElementById('search-wrap').contains(e.target))acBox.style.display='none';});
function highlightAc(items){items.forEach((el,i)=>el.classList.toggle('active',i===acIndex));}
function selectCountry(c){searchInput.value=c.name;acBox.style.display='none';submitGuess();}

// ======================== GUESS LOGIC ========================
document.getElementById('submit-btn').addEventListener('click',submitGuess);
function submitGuess(){
  if(gameOver)return;
  const q=searchInput.value.trim().toLowerCase();
  const country=COUNTRIES.find(c=>c.name.toLowerCase()===q);
  if(!country)return;
  if(guesses.find(g=>g.country.name===country.name))return;
  const distance=calculateDistance(country.lat,country.lng,targetCountry.lat,targetCountry.lng);
  const color=getProximityColor(distance);
  guesses.push({country,distance,color});
  searchInput.value=''; acBox.style.display='none';
  addMarker(country.lat,country.lng,color.bg);
  if(country.name===targetCountry.name){gameOver=true;showWinModal();}
  renderUI();
}

// ======================== RENDER UI ========================
function renderUI(){
  document.getElementById('guess-count').textContent=guesses.length;
  document.getElementById('hints-used').textContent=hintsUsed;
  const feedEl=document.getElementById('feedback-text');
  if(guesses.length===0){feedEl.textContent='Guess a country to begin!';feedEl.style.color='#888';}
  else {
    const last=guesses[guesses.length-1];
    if(last.country.name===targetCountry.name){feedEl.textContent=`🎉 The answer was ${targetCountry.name}!`;feedEl.style.color='#43a047';}
    else{feedEl.textContent=`${last.country.name} ${getDistanceLabel(last.distance)}`;feedEl.style.color=last.color.bg;}
  }
  const listWrap=document.getElementById('guess-list-wrap');
  if(guesses.length>0){
    listWrap.style.display='block';
    const best=guesses.reduce((b,g)=>g.distance<b.distance?g:b,guesses[0]);
    document.getElementById('best-guess-name').textContent=best.country.name;
    const top3=[...guesses].sort((a,b)=>a.distance-b.distance).slice(0,3);
    document.getElementById('top3-rows').innerHTML=top3.map(g=>guessRowHTML(g)).join('');
    const allNewest=[...guesses].reverse();
    document.getElementById('all-guess-rows').innerHTML=allNewest.map(g=>guessRowHTML(g)).join('');
  } else { listWrap.style.display='none'; }
  const distWrap=document.getElementById('dist-bar-wrap');
  if(guesses.length>0){
    distWrap.style.display='block';
    const last=guesses[guesses.length-1], pct=getProximityPercent(last.distance), col=last.color;
    document.getElementById('dist-km').textContent=Math.round(last.distance).toLocaleString()+' km';
    document.getElementById('dist-bar-fill').style.width=pct+'%';
    document.getElementById('dist-bar-fill').style.background=col.bg;
    document.getElementById('dist-label').textContent=col.label;
    document.getElementById('dist-label').style.color=col.bg;
    document.getElementById('dist-pct').textContent=pct+'% proximity';
  } else { distWrap.style.display='none'; }
  document.getElementById('hint-btn').disabled=hintsUsed>=1||gameOver;
  document.getElementById('reveal-btn').disabled=gameOver;
  document.getElementById('submit-btn').disabled=gameOver;
}
function guessRowHTML(g){
  const pct=getProximityPercent(g.distance), col=g.color;
  const bearing=getBearing(g.country.lat,g.country.lng,targetCountry.lat,targetCountry.lng);
  const arrow=g.distance<200?'🎯':getDirectionArrow(bearing);
  return `<div class="guess-row" style="background:${col.bg}22">
    <img class="guess-flag" src="https://flagcdn.com/24x18/${g.country.code.toLowerCase()}.png" onerror="this.style.display='none'"/>
    <span class="guess-name">${g.country.name}</span>
    <span class="guess-pct" style="background:${col.bg};color:${col.textColor}">${pct}%</span>
    <span class="guess-arrow">${arrow}</span>
  </div>`;
}

// ======================== HINT ========================
document.getElementById('hint-btn').addEventListener('click',()=>{
  if(hintsUsed>=1||gameOver)return;
  const hints=[
    c=>`This country's name starts with "${c.name[0]}".`,
    c=>`The country code is "${c.code}".`,
    c=>`Located around ${Math.round(c.lat)}°lat, ${Math.round(c.lng)}°lng.`
  ];
  document.getElementById('hint-text').textContent=hints[0](targetCountry);
  document.getElementById('hint-modal').style.display='flex';
  hintsUsed++; renderUI();
});

// ======================== REVEAL ========================
document.getElementById('reveal-btn').addEventListener('click',()=>{
  if(gameOver)return; gameOver=true;
  const feedEl=document.getElementById('feedback-text');
  feedEl.textContent=`🌍 The answer was ${targetCountry.name}!`; feedEl.style.color='#ef6c00';
  renderUI();
});

// ======================== NEW GAME ========================
document.getElementById('exit-btn').addEventListener('click',startNewGame);
function startNewGame(){document.getElementById('win-modal').style.display='none';initGame();}

// ======================== WIN MODAL ========================
function showWinModal(){
  document.getElementById('win-flag').src=`https://flagcdn.com/48x36/${targetCountry.code.toLowerCase()}.png`;
  document.getElementById('win-country').textContent=targetCountry.name;
  document.getElementById('win-guesses').textContent=`You got it in ${guesses.length} guess${guesses.length!==1?'es':''}!`;
  document.getElementById('win-modal').style.display='flex';
}

// ======================== START ========================
window.addEventListener('load',()=>{initGlobe();initGame();});
</script>
